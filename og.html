<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #d9e2fb 0%, #eef2fa 48%, #fae0e4 100%);
    -webkit-print-color-adjust: exact;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    width: 1020px; height: 470px;
    background: rgba(255, 255, 255, 0.62);
    -webkit-backdrop-filter: blur(28px) saturate(130%);
    backdrop-filter: blur(28px) saturate(130%);
    border: 1px solid rgba(255, 255, 255, 0.9);
    border-radius: 34px;
    box-shadow: 0 30px 80px rgba(20, 32, 58, 0.18);
    padding: 64px 70px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .pill {
    align-self: flex-start;
    font-size: 19px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
    color: #3253dc;
    border: 1.5px solid rgba(50, 83, 220, 0.35);
    border-radius: 999px; padding: 9px 18px; margin-bottom: 30px;
  }
  .wordmark { font-size: 96px; font-weight: 800; letter-spacing: -0.03em; color: #14203a; line-height: 1; }
  .wordmark .os { color: #3253dc; }
  .tagline { margin-top: 22px; font-size: 38px; font-weight: 650; color: #14203a; letter-spacing: -0.01em; }
  .foot {
    margin-top: 40px; display: flex; align-items: center; gap: 16px;
    font-size: 22px; color: #44506b;
  }
  .foot .dot { width: 9px; height: 9px; border-radius: 50%; background: #ec1c2e; }
  .foot b { color: #14203a; font-weight: 700; }
</style>
</head>
<body>
  <div class="card">
    <div class="pill">Snapdragon Partnership · Passcode required</div>
    <div class="wordmark">Aura<span class="os">&nbsp;OS</span></div>
    <div class="tagline">The post-app operating system.</div>
    <div class="foot"><span class="dot"></span><span><b>Fuse Link</b> &nbsp;·&nbsp; prepared by Özgür Celebi</span></div>
  </div>
</body>
</html>
